<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#2563eb"/>
  
  <!-- Gradient overlay -->
  <rect width="1200" height="630" fill="url(#gradient)" opacity="0.3"/>
  
  <!-- Logo area -->
  <rect x="40" y="40" width="80" height="80" rx="16" fill="white"/>
  <text x="80" y="95" text-anchor="middle" fill="#2563eb" font-family="Arial, sans-serif" font-size="36" font-weight="bold">CP</text>
  
  <!-- Title -->
  <text x="600" y="200" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="64" font-weight="bold">
    CashPeek
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="270" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="32" opacity="0.9">
    Сравнение займов онлайн
  </text>
  
  <!-- Features -->
  <rect x="100" y="350" width="320" height="120" rx="16" fill="white" fill-opacity="0.15"/>
  <text x="260" y="400" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="bold">8+ МФО</text>
  <text x="260" y="430" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" opacity="0.8">Проверенных компаний</text>
  
  <rect x="440" y="350" width="320" height="120" rx="16" fill="white" fill-opacity="0.15"/>
  <text x="600" y="400" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="bold">0%</text>
  <text x="600" y="430" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" opacity="0.8">Первый займ бесплатно</text>
  
  <rect x="780" y="350" width="320" height="120" rx="16" fill="white" fill-opacity="0.15"/>
  <text x="940" y="400" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="bold">5 мин</text>
  <text x="940" y="430" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" opacity="0.8">Быстрое решение</text>
  
  <!-- CTA -->
  <text x="600" y="550" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="20" opacity="0.8">
    cashpeek.ru
  </text>
  
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
</svg>
